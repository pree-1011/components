<!DOCTYPE html>
<html>

<head>
<title>IIoT Security Crossword</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
}

.grid{

display:grid;
grid-template-columns:repeat(10,40px);
gap:4px;
justify-content:center;
margin-top:20px;

}

.cell{

width:40px;
height:40px;
font-size:18px;
text-align:center;
text-transform:uppercase;

}

.block{
background:black;
}

.cell:focus{
background:#d4e6f1;
outline:none;
}

button{

margin-top:20px;
padding:10px 20px;
background:#2e86c1;
color:white;
border:none;

}

</style>

</head>

<body>

<h1>IIoT Security Crossword</h1>

<div class="grid">

<input class="cell" id="1" onclick="q(1)">
<input class="cell" id="2" onclick="q(1)">
<input class="cell" id="3" onclick="q(1)">
<input class="cell" id="4" onclick="q(1)">
<input class="cell" id="5" onclick="q(1)">
<input class="cell" id="6" onclick="q(1)">
<input class="cell" id="7" onclick="q(1)">
<input class="cell" id="8" onclick="q(1)">
<input class="cell" id="9" onclick="q(1)">
<input class="cell" id="10" onclick="q(1)">

<input class="cell" id="11" onclick="q(2)">
<input class="cell" id="12" onclick="q(2)">
<input class="cell" id="13" onclick="q(2)">
<input class="cell" id="14" onclick="q(2)">
<input class="cell" id="15" onclick="q(2)">
<input class="cell" id="16" onclick="q(2)">
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>

<input class="cell" id="17" onclick="q(3)">
<input class="cell" id="18" onclick="q(3)">
<input class="cell" id="19" onclick="q(3)">
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>

<input class="cell" id="20" onclick="q(4)">
<input class="cell" id="21" onclick="q(4)">
<input class="cell" id="22" onclick="q(4)">
<input class="cell" id="23" onclick="q(4)">
<input class="cell" id="24" onclick="q(4)">
<input class="cell" id="25" onclick="q(4)">
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>
<input class="block" disabled>

</div>

<div id="question">
Click box to see question
</div>

<button onclick="check()">Check Answers</button>

<div id="score"></div>

<script>

function q(n){

if(n==1)
question.innerHTML="1: Process of converting data into secret code";

if(n==2)
question.innerHTML="2: Industrial data collection device";

if(n==3)
question.innerHTML="3: Used to lock encrypted data";

if(n==4)
question.innerHTML="4: Person who breaks security";

}

let inputs=document.querySelectorAll(".cell");

inputs.forEach((box,index)=>{

box.addEventListener("keyup",function(e){

if(this.value.length==1 && index<inputs.length-1)
inputs[index+1].focus();

if(e.key=="ArrowRight")
inputs[index+1].focus();

if(e.key=="ArrowLeft")
inputs[index-1].focus();

if(e.key=="ArrowDown")
inputs[index+10]?.focus();

if(e.key=="ArrowUp")
inputs[index-10]?.focus();

if(e.key=="Backspace" && this.value=="")
inputs[index-1]?.focus();

});

});

function check(){

let score=0;

let w1="";
for(let i=1;i<=10;i++)
w1+=document.getElementById(i).value;

let w2="";
for(let i=11;i<=16;i++)
w2+=document.getElementById(i).value;

let w3="";
for(let i=17;i<=19;i++)
w3+=document.getElementById(i).value;

let w4="";
for(let i=20;i<=25;i++)
w4+=document.getElementById(i).value;

if(w1.toUpperCase()=="ENCRYPTION")
score++;

if(w2.toUpperCase()=="SENSOR")
score++;

if(w3.toUpperCase()=="KEY")
score++;

if(w4.toUpperCase()=="HACKER")
score++;

document.getElementById("score").innerHTML=
"Score : "+score+"/4";

}

</script>

</body>

</html>
